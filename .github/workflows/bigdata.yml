name: Pipeline Big Data (EA1 + EA2 + EA3)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      # 1. Preparación del Entorno
      - name: Checkout del codigo
        uses: actions/checkout@v3

      # 2. Configura Python
      - name: Configurar Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Instala dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      # 4. Fase 1: Ingesta de datos (EA1)
      - name: Ejecutar Ingesta (EA1)
        run: python src/ingestion.py

      # 5. Fase 2: Limpieza de datos (EA2)
      - name: Ejecutar Limpieza (EA2)
        run: python src/cleaning.py

      # 6. Fase 3: Enriquecimiento de datos (EA3)
      - name: Ejecutar Enriquecimiento (EA3)
        run: python src/enrichement.py

      # 7. Guardado Automático de Evidencias
      - name: Commit y Push de resultados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "EA3: Pipeline completo y enriquecimiento generado" || echo "Sin cambios"
          git push
